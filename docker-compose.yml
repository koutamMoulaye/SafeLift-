# =============================================================================
# SafeLift - Stack locale (etape 1/6 : scaffolding)
# Services : Zookeeper + Kafka, Spark (master + worker), Airflow (LocalExecutor),
# PostgreSQL applicatif, PostgreSQL Airflow (metadata, separe du postgres appli),
# et un dashboard FastAPI placeholder.
# =============================================================================

x-airflow-common-env: &airflow-common-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER}:${AIRFLOW_POSTGRES_PASSWORD}@airflow-postgres:5432/${AIRFLOW_POSTGRES_DB}
  AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
  # Jalon 2, sous-etape 3/5 : scripts/consume_user_inputs.py declenche
  # gold_dbt_run via l'API REST d'Airflow (POST /api/v1/dags/.../dagRuns)
  # apres avoir insere une seance temps reel -- le backend d'auth PAR DEFAUT
  # ("session", confirme via `airflow config get-value api auth_backends`)
  # exige un cookie de session obtenu via le formulaire de login web, pas
  # utilisable pour un appel HTTP programmatique simple. "basic_auth" est
  # ajoute ici (en plus de "session", qui reste utile pour l'UI web
  # elle-meme) pour permettre l'authentification Basic avec les identifiants
  # admin existants (AIRFLOW_ADMIN_USERNAME/PASSWORD). Seul le webserver
  # (qui sert l'API) exploite reellement ce reglage ; herite par
  # scheduler/init via cette ancre commune sans effet pour eux.
  AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"

x-airflow-common-volumes: &airflow-common-volumes
  - ./airflow/dags:/opt/airflow/dags
  - airflow_logs:/opt/airflow/logs
  # Acces au data lake medaillon (Bronze/Silver/Gold) pour les DAGs d'ingestion
  - ./data:/opt/airflow/data
  # Meme chemin /opt/data que sur spark-master/spark-worker (cf. plus bas) : le
  # driver Spark soumis en mode client depuis Airflow doit voir exactement le
  # meme chemin absolu que les executeurs pour lire/ecrire les fichiers du data
  # lake de maniere coherente.
  - ./data:/opt/data
  # Scripts des jobs Spark, pour que spark-submit (mode client) puisse lire le
  # fichier .py localement avant de soumettre le job au cluster
  - ./spark/jobs:/opt/airflow/spark_jobs
  # Projet dbt (modeles Gold), execute via le venv isole /opt/dbt_venv (cf. airflow/Dockerfile)
  - ./dbt:/opt/airflow/dbt
  # Scripts Python autonomes (pas des jobs Spark, pas des modeles dbt) : ex.
  # scripts/fuzzy_match_exercises.py, execute dans l'environnement Airflow
  - ./scripts:/opt/airflow/scripts

services:
  # ---------------------------------------------------------------------------
  # Kafka (broker unique) + Zookeeper
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: safelift-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT}
      ZOOKEEPER_TICK_TIME: 2000
      # "ruok" (are you ok) est la commande de sonde native du protocole Zookeeper
      # (4 lettres words) ; desactivee par defaut. L'image cp-zookeeper 7.6 ne
      # supporte pas de variable ZOOKEEPER_4LW_COMMANDS_WHITELIST dediee, on
      # passe donc par la propriete systeme JVM equivalente via KAFKA_OPTS.
      KAFKA_OPTS: -Dzookeeper.4lw.commands.whitelist=ruok
    ports:
      - "${ZOOKEEPER_PORT_EXPOSED}:${ZOOKEEPER_CLIENT_PORT}"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/${ZOOKEEPER_CLIENT_PORT} && echo -n ruok >&3 && timeout 2 cat <&3 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - safelift-network

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: safelift-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID}
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:${ZOOKEEPER_CLIENT_PORT}
      # Deux listeners : un pour la communication inter-conteneurs (reseau docker),
      # un pour l'acces depuis l'hote (via le port expose sur localhost)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:${KAFKA_INTERNAL_PORT},PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:${KAFKA_INTERNAL_PORT},PLAINTEXT_HOST://localhost:${KAFKA_EXTERNAL_PORT_EXPOSED}
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "${KAFKA_EXTERNAL_PORT_EXPOSED}:9093"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:${KAFKA_INTERNAL_PORT} --list"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s
    networks:
      - safelift-network

  # Conteneur "one-shot" qui cree les topics puis s'arrete (exit 0).
  # Jalon 2, sous-etape 1/5 : ajout de la creation de
  # ${KAFKA_GYM_OCCUPANCY_TOPIC} (safelift-gym-occupancy), topic DEDIE au
  # streaming d'affluence -- le topic de test cree a l'etape 1/6 du Jalon 1
  # (${KAFKA_TEST_TOPIC}) n'est qu'une verification initiale du broker, pas
  # reutilise pour des donnees applicatives. Choix de centraliser la
  # creation ici (plutot que dans scripts/simulate_gym_occupancy.py via un
  # AdminClient) : source unique de verite pour les topics du projet, deja
  # le mecanisme etabli au Jalon 1. Note : KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
  # est egalement actif sur le broker (cf. service kafka ci-dessus), donc la
  # publication fonctionnerait meme sans cette etape -- kafka-init reste
  # utile pour un partitionnement/replication explicites et une confirmation
  # visible en log que le topic existe avant de demarrer gym-simulator.
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: safelift-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["bash", "-c"]
    command: >
      "kafka-topics --bootstrap-server kafka:${KAFKA_INTERNAL_PORT} --create --if-not-exists
      --topic ${KAFKA_TEST_TOPIC} --partitions 1 --replication-factor 1
      && kafka-topics --bootstrap-server kafka:${KAFKA_INTERNAL_PORT} --create --if-not-exists
      --topic ${KAFKA_GYM_OCCUPANCY_TOPIC} --partitions 1 --replication-factor 1
      && kafka-topics --bootstrap-server kafka:${KAFKA_INTERNAL_PORT} --create --if-not-exists
      --topic ${KAFKA_USER_INPUTS_TOPIC} --partitions 1 --replication-factor 1
      && echo 'Topics disponibles :'
      && kafka-topics --bootstrap-server kafka:${KAFKA_INTERNAL_PORT} --list"
    networks:
      - safelift-network

  # ---------------------------------------------------------------------------
  # Spark standalone (1 master + 1 worker)
  # ---------------------------------------------------------------------------
  spark-master:
    image: apache/spark:3.5.8-python3
    container_name: safelift-spark-master
    restart: unless-stopped
    entrypoint: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master", "--host", "0.0.0.0"]
    ports:
      - "${SPARK_MASTER_UI_PORT_EXPOSED}:8080"
      - "${SPARK_MASTER_PORT_EXPOSED}:7077"
    volumes:
      - ./spark/jobs:/opt/spark-jobs
      # Meme chemin que sur les conteneurs airflow-* : necessaire pour que les
      # jobs Silver lisent/ecrivent le data lake de maniere coherente entre le
      # driver (soumis depuis Airflow) et les executeurs.
      - ./data:/opt/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - safelift-network

  spark-worker:
    image: apache/spark:3.5.8-python3
    container_name: safelift-spark-worker
    restart: unless-stopped
    depends_on:
      spark-master:
        condition: service_healthy
    entrypoint: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES}
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY}
    ports:
      - "${SPARK_WORKER_UI_PORT_EXPOSED}:8081"
    volumes:
      - ./spark/jobs:/opt/spark-jobs
      - ./data:/opt/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - safelift-network

  # ---------------------------------------------------------------------------
  # PostgreSQL applicatif (futur data warehouse / schema en etoile - etapes suivantes)
  # ---------------------------------------------------------------------------
  app-postgres:
    image: postgres:16-alpine
    container_name: safelift-app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${APP_POSTGRES_USER}
      POSTGRES_PASSWORD: ${APP_POSTGRES_PASSWORD}
      POSTGRES_DB: ${APP_POSTGRES_DB}
    ports:
      - "${APP_POSTGRES_PORT_EXPOSED}:5432"
    volumes:
      - app_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_POSTGRES_USER} -d ${APP_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - safelift-network

  # ---------------------------------------------------------------------------
  # PostgreSQL dedie a Airflow (metadata DB uniquement, SEPARE du postgres applicatif)
  # ---------------------------------------------------------------------------
  airflow-postgres:
    image: postgres:16-alpine
    container_name: safelift-airflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${AIRFLOW_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_POSTGRES_DB}
    ports:
      - "${AIRFLOW_POSTGRES_PORT_EXPOSED}:5432"
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_POSTGRES_USER} -d ${AIRFLOW_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - safelift-network

  # ---------------------------------------------------------------------------
  # Airflow (LocalExecutor) : init (migration DB + user admin), webserver, scheduler
  # ---------------------------------------------------------------------------
  airflow-init:
    build: ./airflow
    image: safelift-airflow:local
    container_name: safelift-airflow-init
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      <<: *airflow-common-env
    volumes: *airflow-common-volumes
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "airflow db migrate &&
      (airflow users create
      --username ${AIRFLOW_ADMIN_USERNAME}
      --password ${AIRFLOW_ADMIN_PASSWORD}
      --firstname ${AIRFLOW_ADMIN_FIRSTNAME}
      --lastname ${AIRFLOW_ADMIN_LASTNAME}
      --role Admin
      --email ${AIRFLOW_ADMIN_EMAIL} || true)"
    networks:
      - safelift-network

  airflow-webserver:
    image: safelift-airflow:local
    container_name: safelift-airflow-webserver
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-postgres:
        condition: service_healthy
    environment:
      <<: *airflow-common-env
    volumes: *airflow-common-volumes
    command: webserver
    ports:
      - "${AIRFLOW_WEBSERVER_PORT_EXPOSED}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - safelift-network

  airflow-scheduler:
    image: safelift-airflow:local
    container_name: safelift-airflow-scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-postgres:
        condition: service_healthy
    environment:
      <<: *airflow-common-env
    volumes: *airflow-common-volumes
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$$(hostname)\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - safelift-network

  # ---------------------------------------------------------------------------
  # Dashboard de serving (FastAPI + silhouette SVG) - etape 5/6
  # Lit uniquement le schema "gold" de app-postgres (deja alimente par dbt,
  # cf. gold_dbt_run.py) : aucune ecriture, aucun autre service impacte.
  # ---------------------------------------------------------------------------
  dashboard:
    build: ./dashboard
    container_name: safelift-dashboard
    restart: unless-stopped
    depends_on:
      app-postgres:
        condition: service_healthy
      # Jalon 2, sous-etape 3/5 : POST /users/{user_id}/sessions publie sur
      # Kafka (safelift-user-inputs) -- s'assure que le topic existe avant
      # que le dashboard ne demarre (KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      # reste un filet de securite si jamais ce n'etait pas le cas).
      kafka-init:
        condition: service_completed_successfully
    environment:
      APP_POSTGRES_HOST: app-postgres
      APP_POSTGRES_PORT: 5432
      APP_POSTGRES_DB: ${APP_POSTGRES_DB}
      APP_POSTGRES_USER: ${APP_POSTGRES_USER}
      APP_POSTGRES_PASSWORD: ${APP_POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:${KAFKA_INTERNAL_PORT}
      KAFKA_USER_INPUTS_TOPIC: ${KAFKA_USER_INPUTS_TOPIC}
    ports:
      - "${DASHBOARD_PORT_EXPOSED}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - safelift-network

  # ---------------------------------------------------------------------------
  # Simulateur d'affluence (Jalon 2, sous-etape 1/5) : publie en continu des
  # messages JSON d'occupation par salle sur le topic Kafka
  # safelift-gym-occupancy. PAS un DAG Airflow (processus long-courant de
  # streaming, pas un batch planifie) : service Docker independant, comme le
  # dashboard. Lit gold.dim_gym (cree par dbt, voir dbt/models/marts/dim_gym.sql)
  # au demarrage -- necessite donc qu'un `dbt seed`+`dbt run --select dim_gym`
  # ait deja ete execute au moins une fois (voir PROGRESS_JALON2.md) ; en
  # attendant, le script retente la lecture avec backoff plutot que de
  # planter immediatement (cf. load_gyms_with_retry()).
  # ---------------------------------------------------------------------------
  gym-simulator:
    build:
      context: ./scripts
      dockerfile: Dockerfile.gym_simulator
    container_name: safelift-gym-simulator
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      app-postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:${KAFKA_INTERNAL_PORT}
      KAFKA_GYM_OCCUPANCY_TOPIC: ${KAFKA_GYM_OCCUPANCY_TOPIC}
      APP_POSTGRES_HOST: app-postgres
      APP_POSTGRES_PORT: 5432
      APP_POSTGRES_DB: ${APP_POSTGRES_DB}
      APP_POSTGRES_USER: ${APP_POSTGRES_USER}
      APP_POSTGRES_PASSWORD: ${APP_POSTGRES_PASSWORD}
      GYM_SIMULATOR_INTERVAL_MIN_SECONDS: ${GYM_SIMULATOR_INTERVAL_MIN_SECONDS}
      GYM_SIMULATOR_INTERVAL_MAX_SECONDS: ${GYM_SIMULATOR_INTERVAL_MAX_SECONDS}
    healthcheck:
      # Pas de port HTTP expose par ce service (producteur Kafka pur) : le
      # healthcheck relit le fichier de heartbeat reecrit a chaque cycle
      # reussi par le script (voir HEARTBEAT_PATH dans simulate_gym_occupancy.py).
      # Seuil fixe a 60s (marge large par rapport a l'intervalle par defaut
      # de 5-10s) -- a ajuster si GYM_SIMULATOR_INTERVAL_MAX_SECONDS est un
      # jour configure bien au-dessus de cette valeur.
      test: ["CMD", "python", "-c", "import time,sys; sys.exit(0 if (time.time() - float(open('/tmp/gym_simulator_heartbeat').read())) < 60 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - safelift-network

  # ---------------------------------------------------------------------------
  # Consumer Spark Structured Streaming (Jalon 2, sous-etape 2/5) : lit en
  # continu safelift-gym-occupancy et maintient l'etat courant (dernier
  # message par salle) dans gold.gym_occupancy_live. PAS un DAG Airflow
  # (processus long-courant de streaming, pas un batch planifie) : soumis en
  # mode client au cluster Spark existant (spark-master/spark-worker) par ce
  # service dedie, qui joue le role de "driver" et reste demarre en continu.
  # Voir spark/jobs/stream_gym_occupancy.py pour le detail des choix
  # (startingOffsets=latest, upsert via ON CONFLICT, aucun operateur
  # stateful) et data/gold/GOLD_MODEL_DECISIONS.md section 10.
  # ---------------------------------------------------------------------------
  spark-streaming-gym:
    build:
      context: ./spark
      dockerfile: Dockerfile.streaming
    container_name: safelift-spark-streaming-gym
    restart: unless-stopped
    depends_on:
      spark-worker:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      app-postgres:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    # spark.driver.host=$(hostname -i)/spark.driver.bindAddress=0.0.0.0 :
    # meme necessite qu'en Silver/Gold (mode client dans Docker Compose, voir
    # airflow/dags/silver_transformation.py) -- le driver (ce conteneur) doit
    # s'annoncer aux executeurs (spark-worker) avec une adresse joignable.
    # Pas de spark.hadoop.fs.permissions.umask-mode=000 ici (contrairement a
    # Silver) : ce job n'ecrit aucun fichier partage avec les executeurs, le
    # sink est Postgres et le seul repertoire local (checkpoint) n'est monte
    # que sur ce conteneur -- voir stream_gym_occupancy.py.
    # /opt/spark/bin/spark-submit en chemin complet : /opt/spark/bin n'est PAS
    # dans le PATH par defaut de cette image (confirme via `docker inspect`,
    # meme raison pour laquelle spark-master/spark-worker utilisent deja un
    # chemin complet dans leur entrypoint, cf. plus haut dans ce fichier).
    # spark.jars.ivy=/tmp/.ivy2 : l'utilisateur "spark" de l'image officielle
    # a un $HOME=/nonexistent (repertoire inexistant, confirme en test reel --
    # `--packages` echoue sinon avec FileNotFoundException, Ivy essayant
    # d'ecrire son cache dans /nonexistent/.ivy2/cache). /tmp est toujours
    # inscriptible, quel que soit l'utilisateur du conteneur.
    # spark.cores.max=1 : BUG REEL rencontre en testant la sous-etape 3/5 --
    # cette application Structured Streaming est LONG-COURANTE et garde ses
    # coeurs alloues en permanence (contrairement a un job batch qui les
    # relache a la fin). Sans cette limite, elle capture les 2 coeurs du
    # worker (SPARK_WORKER_CORES) des son demarrage et les garde
    # indefiniment -- tout job batch soumis ensuite (ex. load_silver_to_postgres,
    # declenche par gold_dbt_run) reste bloque a l'etat WAITING avec 0 coeur
    # alloue, POUR TOUJOURS (confirme via l'API JSON du master,
    # http://spark-master:8080/json/, `coresused: 2` en continu, app batch
    # `state: WAITING`, `cores: 0`). Le volume de ce topic (1 partition, 5
    # messages/5-10s) ne justifie de toute facon qu'un seul coeur.
    command: >
      "/opt/spark/bin/spark-submit
      --master spark://spark-master:7077
      --deploy-mode client
      --conf spark.driver.host=$(hostname -i)
      --conf spark.driver.bindAddress=0.0.0.0
      --conf spark.jars.ivy=/tmp/.ivy2
      --conf spark.cores.max=1
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.8
      /opt/spark-jobs/stream_gym_occupancy.py"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:${KAFKA_INTERNAL_PORT}
      KAFKA_GYM_OCCUPANCY_TOPIC: ${KAFKA_GYM_OCCUPANCY_TOPIC}
      APP_POSTGRES_HOST: app-postgres
      APP_POSTGRES_PORT: 5432
      APP_POSTGRES_DB: ${APP_POSTGRES_DB}
      APP_POSTGRES_USER: ${APP_POSTGRES_USER}
      APP_POSTGRES_PASSWORD: ${APP_POSTGRES_PASSWORD}
    volumes:
      - ./spark/jobs:/opt/spark-jobs
      # Checkpoint Spark : volume DEDIE, monte uniquement sur ce conteneur
      # (pas sur spark-worker -- aucun operateur stateful, le checkpoint
      # (offsets Kafka + log de commit du sink) est gere entierement par le
      # driver). Survit aux redemarrages du conteneur (restart: unless-stopped).
      - spark_streaming_checkpoints:/tmp/spark-checkpoints
    healthcheck:
      # Meme pattern que gym-simulator : pas de port HTTP expose, le
      # healthcheck relit le fichier de heartbeat reecrit apres chaque
      # micro-batch reussi (voir HEARTBEAT_PATH dans stream_gym_occupancy.py).
      # Seuil large (120s) car le premier micro-batch peut prendre du temps
      # (telechargement du package spark-sql-kafka via --packages au premier
      # demarrage, resolution Ivy).
      test: ["CMD", "python3", "-c", "import time,sys; sys.exit(0 if (time.time() - float(open('/tmp/spark_streaming_heartbeat').read())) < 120 else 1)"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - safelift-network

  # ---------------------------------------------------------------------------
  # Consumer des saisies utilisateur temps reel (Jalon 2, sous-etape 3/5) :
  # lit safelift-user-inputs, valide/insere dans raw.realtime_user_sessions,
  # puis declenche gold_dbt_run via l'API REST Airflow. PAS un DAG Airflow
  # (processus long-courant de streaming, pas un batch planifie) -- meme
  # famille de service que gym-simulator. Voir
  # scripts/consume_user_inputs.py et data/gold/GOLD_MODEL_DECISIONS.md
  # section 11.
  # ---------------------------------------------------------------------------
  user-inputs-consumer:
    build:
      context: ./scripts
      dockerfile: Dockerfile.consume_user_inputs
    container_name: safelift-user-inputs-consumer
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      app-postgres:
        condition: service_healthy
      airflow-webserver:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:${KAFKA_INTERNAL_PORT}
      KAFKA_USER_INPUTS_TOPIC: ${KAFKA_USER_INPUTS_TOPIC}
      APP_POSTGRES_HOST: app-postgres
      APP_POSTGRES_PORT: 5432
      APP_POSTGRES_DB: ${APP_POSTGRES_DB}
      APP_POSTGRES_USER: ${APP_POSTGRES_USER}
      APP_POSTGRES_PASSWORD: ${APP_POSTGRES_PASSWORD}
      # URL interne au reseau docker (port conteneur 8080, pas le port
      # expose sur l'hote AIRFLOW_WEBSERVER_PORT_EXPOSED).
      AIRFLOW_API_BASE_URL: http://airflow-webserver:8080
      # Reutilise les identifiants admin existants (simplification assumee
      # et documentee -- voir GOLD_MODEL_DECISIONS.md section 11 -- un
      # compte de service dedie avec un role restreint serait plus propre
      # en production).
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
    healthcheck:
      # Meme pattern que gym-simulator/spark-streaming-gym : fichier de
      # heartbeat reecrit a chaque iteration de la boucle de poll (que des
      # messages soient recus ou non, cf. le script).
      test: ["CMD", "python", "-c", "import time,sys; sys.exit(0 if (time.time() - float(open('/tmp/user_inputs_consumer_heartbeat').read())) < 30 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - safelift-network

networks:
  safelift-network:
    name: ${COMPOSE_PROJECT_NAME}-network

volumes:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  app_postgres_data:
  airflow_postgres_data:
  airflow_logs:
  spark_streaming_checkpoints:
