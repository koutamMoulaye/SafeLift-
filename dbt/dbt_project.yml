
name: safelift
version: "1.0.0"
config-version: 2
profile: safelift

model-paths: ["models"]
macro-paths: ["macros"]
test-paths: ["tests"]
analysis-paths: []
seed-paths: ["seeds"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# --- Materialisations ---
# staging : vues (couche fine, pas de duplication de stockage, tables sources
#           deja petites - inutile de materialiser en table)
# marts   : tables (dimensions/faits requetes par le futur dashboard/API,
#           mieux vaut les avoir precalculees qu'en vue recalculee a chaque requete)
models:
  safelift:
    staging:
      +schema: staging
      +materialized: view
    marts:
      +schema: gold
      +materialized: table

# Seeds (donnees de reference statiques, ex. mapping manuel exercice ->
# muscle_group) : schema staging, au meme niveau que les vues staging
# puisqu'elles alimentent les memes modeles marts.
seeds:
  safelift:
    +schema: staging
    demo_user_blocks_seed:
      # Types explicites (pas d'inference automatique) : date_from/date_to
      # doivent etre du meme type `date` que session_date (stg_weight_training)
      # pour que le BETWEEN de stg_workout_sessions_unified.sql fonctionne
      # sans cast implicite fragile.
      +column_types:
        block_number: integer
        user_id: integer
        date_from: date
        date_to: date

# Bornes theoriques de risk_score, partagees entre fact_risk_score.sql et
# fact_risk_score_demo_synthetic.sql (evite la duplication de "nombres
# magiques" entre les deux modeles). Voir data/gold/GOLD_MODEL_DECISIONS.md
# pour la justification complete du calcul.
vars:
  risk_score_min_raw: 0.05
  risk_score_max_raw: 0.86
