version: 2

seeds:
  - name: manual_exercise_muscle_mapping
    description: >
      Correspondance manuelle exercise_name -> muscle_group pour les
      exercices de weight_training les plus frequents restant non resolus
      apres les etapes automatiques (strict, base-name, fuzzy). Chaque ligne
      porte une justification. Voir dim_exercise.sql et
      data/gold/GOLD_MODEL_DECISIONS.md.
    columns:
      - name: normalized_exercise_base_name
        data_tests:
          - unique
          - not_null
      - name: manual_muscle_group
        data_tests:
          - not_null
      - name: justification
        data_tests:
          - not_null

  - name: demo_synthetic_risk_scenarios
    description: >
      TABLE SYNTHETIQUE -- scenarios fictifs pour fact_risk_score_demo_synthetic.sql,
      jamais melanges aux vraies donnees.
    columns:
      - name: scenario_id
        data_tests:
          - unique
          - not_null

  - name: dim_gym_seed
    description: >
      Salles SafeLift -- donnees 100% FICTIVES (Jalon 2, sous-etape 1/5,
      streaming affluence). Voir dim_gym.sql et
      data/gold/GOLD_MODEL_DECISIONS.md section 9.
    columns:
      - name: gym_id
        data_tests:
          - unique
          - not_null
      - name: gym_name
        data_tests:
          - unique
          - not_null
      - name: capacity_max
        data_tests:
          - not_null

  - name: demo_user_blocks_seed
    description: >
      Repartition de l'historique weight_training (570 jours de seance
      reels, 2015-10-23 -> 2018-09-29) en 5 blocs CHRONOLOGIQUES CONTIGUS,
      chacun rattache a un profil dim_user REEL distinct (HYPOTHESE DE
      DEMONSTRATION, aucune cle de jointure reelle -- voir dim_user.sql et
      data/gold/GOLD_MODEL_DECISIONS.md section 5). Remplace l'ancien
      rattachement a un seul demo_user (user_id=9 uniquement). Source
      unique de verite utilisee par dim_user.sql (is_weight_training_demo_user)
      ET stg_workout_sessions_unified.sql (assignation du user_id par
      session_date). user_id fait reference a un id existant dans dim_user
      -- PAS de test `relationships` ici (les seeds sont charges avant les
      modeles marts, une relationship testerait dans le mauvais sens) ;
      la coherence est verifiee manuellement (voir CLAUDE.md, section
      "Extension multi-profils demo").
    columns:
      - name: block_number
        data_tests:
          - unique
          - not_null
      - name: user_id
        data_tests:
          - unique
          - not_null
      - name: date_from
        data_tests:
          - not_null
      - name: date_to
        data_tests:
          - not_null
